# Starship prompt config
# Reference: https://starship.rs/config/

# Two-line prompt: info on first line, $ on second
format = """
#$time|$username$hostname:$directory $git_branch$git_status
$character"""

# Always show username and hostname (default hides on local)
[username]
show_always = true
style_user = "blue"
style_root = "red bold"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "cyan"
format = "[@$hostname]($style)"

[directory]
style = "green"
truncation_length = 0
truncate_to_repo = false
format = "[$path]($style)"

[time]
disabled = false
time_format = "%Y-%m-%d %H:%M"
style = "yellow"
format = "[$time]($style)"

[git_branch]
style = "white"
format = "[($branch)]($style)"

[git_status]
style = "white"
format = '([$all_status$ahead_behind]($style))'
conflicted = "[!](magenta)"
ahead = "[⇡${count}](cyan)"
behind = "[⇣${count}](cyan)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count}](cyan)"
untracked = "[?](green)"
stashed = "[\\$](blue)"
modified = "[*](yellow)"
staged = "[+](cyan)"
renamed = "[o](blue)"
deleted = "[x](red)"

[character]
success_symbol = "[\\$](white)"
error_symbol = "[\\$](red)"
